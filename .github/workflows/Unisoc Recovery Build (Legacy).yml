name: Recovery Build (Legacy)

on:
  workflow_dispatch:
    inputs:
      MANIFEST_URL:
        description: 'Manifest仓库URL（通常无需修改）'
        required: true
        default: 'https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni'
      MANIFEST_BRANCH:
        description: 'Manifest分支（Android 8.1请使用twrp-8.1）'
        required: true
        default: 'twrp-8.1'
      DEVICE_TREE_URL:
        description: '你的设备树仓库URL'
        required: true
        default: 'https://github.com/你的用户名/你的设备树仓库'
      DEVICE_TREE_BRANCH:
        description: '设备树分支'
        required: true
        default: 'main'
      DEVICE_PATH:
        description: '设备树在源码中的路径（如 device/厂商/代号）'
        required: true
        default: 'device/你的厂商/你的代号'
      COMMON_TREE_URL:
        description: '通用树仓库URL（没有则留空）'
        required: false
      COMMON_PATH:
        description: '通用树路径（没有则留空）'
        required: false
      DEVICE_NAME:
        description: '设备代号（将用于输出文件名）'
        required: true
        default: '你的设备代号'
      MAKEFILE_NAME:
        description: '编译目标名称（通常为 omni_你的设备代号）'
        required: true
        default: 'omni_你的设备代号'
      BUILD_TARGET:
        description: '编译目标（recovery或boot）'
        required: true
        default: 'recovery'

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
    - name: Display Run Parameters
      run: |
        echo "::group::User Environment Variables"
        echo "Manifest URL: ${{ github.event.inputs.MANIFEST_URL }}"
        echo "Manifest Branch: ${{ github.event.inputs.MANIFEST_BRANCH }}"
        echo "Device Tree URL: ${{ github.event.inputs.DEVICE_TREE_URL }}"
        echo "Device Tree Branch: ${{ github.event.inputs.DEVICE_TREE_BRANCH }}"
        echo "Device Path: ${{ github.event.inputs.DEVICE_PATH }}"
        echo "Device Name: ${{ github.event.inputs.DEVICE_NAME }}"
        echo "Makefile Name: ${{ github.event.inputs.MAKEFILE_NAME }}"
        echo "Build Target: ${{ github.event.inputs.BUILD_TARGET }}.img"
        echo "::endgroup::"

    - name: Check Out
      uses: actions/checkout@v4

    - name: Cleanup
      uses: rokibhasansagar/slimhub_actions@main

    - name: Prepare the environment
      run: |
        sudo apt update && sudo apt upgrade -y
        DEBIAN_FRONTEND=noninteractive sudo apt install -yq \
            linux-modules-extra-$(uname -r) \
            gperf gcc-multilib gcc-10-multilib g++-multilib g++-10-multilib \
            libc6-dev lib32ncurses5-dev x11proto-core-dev libx11-dev tree lib32z-dev libgl1-mesa-dev libxml2-utils \
            xsltproc bc ccache lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev \
            libwxgtk3.0-gtk3-dev libxml2 lzop pngcrush schedtool squashfs-tools \
            imagemagick libbz2-dev lzma ncftp qemu-user-static libstdc++-10-dev libncurses5 python3 tar

    - name: Install OpenJDK 8
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '8'

    - name: Setup SSH Keys
      if: ${{ startsWith(github.event.inputs.MANIFEST_URL, 'git@github.com') || 
          startsWith(github.event.inputs.DEVICE_TREE_URL, 'git@github.com') ||
          startsWith(github.event.inputs.COMMON_TREE_URL, 'git@github.com') }}
      uses: webfactory/ssh-agent@v0.9.0
      with:
          ssh-private-key: |
            ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Install repo
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Initialize repo
      run: |
        mkdir workspace
        cd workspace
        echo "workspace-folder=$(pwd)" >> $GITHUB_OUTPUT
        git config --global user.name "azwhikaru"
        git config --global user.email "azwhikaru+37921907@github.com"
        repo init --depth=1 -u ${{ github.event.inputs.MANIFEST_URL }} -b ${{ github.event.inputs.MANIFEST_BRANCH }}
      id: pwd

    - name: Repo Sync
      run: |
        repo sync -j$(nproc --all) --force-sync
      working-directory: workspace

    - name: Clone device tree
      run: |
        git clone ${{ github.event.inputs.DEVICE_TREE_URL }} -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} ./${{ github.event.inputs.DEVICE_PATH }}
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    # ========== 展讯 DRM 补丁 ==========
    - name: Clone Unisoc DRM patch
      run: |
        git clone https://github.com/rtyutechstudio/unisoc-twrp-sourcecode_patch.git ./patch/unisoc-patch
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Apply Unisoc DRM patch
      run: |
        PATCH_FILE="./patch/unisoc-patch/graphics_drm.cpp"
        TARGET_FILE="./bootable/recovery/minuitwrp/graphics_drm.cpp"
        if [ -f "$PATCH_FILE" ]; then
          echo "✅ Applying Unisoc DRM patch..."
          cp -f "$PATCH_FILE" "$TARGET_FILE"
          echo "✅ Patch applied successfully."
        else
          echo "⚠️ Patch file not found, skipping."
        fi
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Remove incompatible Android.bp
      run: |
        if [ -f ./${{ github.event.inputs.DEVICE_PATH }}/Android.bp ]; then
          echo "Removing Android.bp (soong_namespace not supported)"
          rm ./${{ github.event.inputs.DEVICE_PATH }}/Android.bp
        fi
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Clone common tree
      if: |
        github.event.inputs.COMMON_TREE_URL != null
        && github.event.inputs.COMMON_PATH != null
      run: |
        git clone ${{ github.event.inputs.COMMON_TREE_URL }} -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} ./${{ github.event.inputs.COMMON_PATH }}
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    # ========== 强制精简 BoardConfig ==========
    - name: Force TWRP size optimizations (override BoardConfig)
      run: |
        BOARD_FILE="${{ steps.pwd.outputs.workspace-folder }}/${{ github.event.inputs.DEVICE_PATH }}/BoardConfig.mk"
        if [ ! -f "$BOARD_FILE" ]; then
          echo "❌ BoardConfig.mk not found! Exiting."
          exit 1
        fi
        echo "✅ Found BoardConfig.mk"

        # 1. 强制使用 xz 压缩（比 gzip 压缩率更高）
        sed -i '/BOARD_RAMDISK_COMPRESSOR/d' "$BOARD_FILE"
        echo "BOARD_RAMDISK_COMPRESSOR := xz" >> "$BOARD_FILE"

        # 2. 强制禁用所有可选的额外组件（逐一覆盖可能存在的 true）
        sed -i '/TW_INCLUDE_BASH/d' "$BOARD_FILE"
        echo "TW_INCLUDE_BASH := false" >> "$BOARD_FILE"
        sed -i '/TW_INCLUDE_NANO/d' "$BOARD_FILE"
        echo "TW_INCLUDE_NANO := false" >> "$BOARD_FILE"
        sed -i '/TW_INCLUDE_PIGZ/d' "$BOARD_FILE"
        echo "TW_INCLUDE_PIGZ := false" >> "$BOARD_FILE"
        sed -i '/TW_INCLUDE_OPENAES/d' "$BOARD_FILE"
        echo "TW_INCLUDE_OPENAES := false" >> "$BOARD_FILE"
        sed -i '/TW_INCLUDE_TWRPAPP/d' "$BOARD_FILE"
        echo "TW_INCLUDE_TWRPAPP := false" >> "$BOARD_FILE"
        sed -i '/TW_INCLUDE_CRYPTO/d' "$BOARD_FILE"
        echo "TW_INCLUDE_CRYPTO := false" >> "$BOARD_FILE"
        sed -i '/TW_INCLUDE_BUSYBOX/d' "$BOARD_FILE"
        echo "TW_INCLUDE_BUSYBOX := false" >> "$BOARD_FILE"
        sed -i '/TW_INCLUDE_OPENSSH/d' "$BOARD_FILE"
        echo "TW_INCLUDE_OPENSSH := false" >> "$BOARD_FILE"

        # 3. 确保 MTP 没有被禁用
        sed -i '/TW_EXCLUDE_MTP/d' "$BOARD_FILE"
        # 不添加 TW_EXCLUDE_MTP，默认保留

        # 4. 设置默认语言和署名
        sed -i '/TW_EXTRA_LANGUAGES/d' "$BOARD_FILE"
        echo "TW_EXTRA_LANGUAGES := true" >> "$BOARD_FILE"
        sed -i '/TW_DEFAULT_LANGUAGE/d' "$BOARD_FILE"
        echo "TW_DEFAULT_LANGUAGE := zh_CN" >> "$BOARD_FILE"
        sed -i '/TW_DEVICE_VERSION/d' "$BOARD_FILE"
        echo "TW_DEVICE_VERSION := Xxinn034" >> "$BOARD_FILE"

        # 5. 【可选】增大分区限制（如设备分区允许，取消注释）
        # echo "BOARD_RECOVERYIMAGE_PARTITION_SIZE := 20971520" >> "$BOARD_FILE"

        echo "🎉 BoardConfig.mk overridden with aggressive optimizations"
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    # 清理 device.mk 中的引用（辅助）
    - name: Clean device.mk references
      run: |
        DEVICE_DIR="${{ steps.pwd.outputs.workspace-folder }}/${{ github.event.inputs.DEVICE_PATH }}"
        for mkfile in device.mk omni.mk; do
          if [ -f "$DEVICE_DIR/$mkfile" ]; then
            echo "Cleaning $mkfile"
            sed -i '/busybox/d' "$DEVICE_DIR/$mkfile"
            sed -i '/bash/d' "$DEVICE_DIR/$mkfile"
            sed -i '/nano/d' "$DEVICE_DIR/$mkfile"
            sed -i '/pigz/d' "$DEVICE_DIR/$mkfile"
            sed -i '/openaes/d' "$DEVICE_DIR/$mkfile"
            sed -i '/twrpapp/d' "$DEVICE_DIR/$mkfile"
            sed -i '/TWRPApp/d' "$DEVICE_DIR/$mkfile"
            sed -i '/libncurses/d' "$DEVICE_DIR/$mkfile"
            sed -i '/openssh/d' "$DEVICE_DIR/$mkfile"
          fi
        done

    # 语言精简（保留 fonts/ 和 languages/ 目录）
    - name: Prune non-Chinese languages
      run: |
        LANG_DIR="${{ steps.pwd.outputs.workspace-folder }}/bootable/recovery/gui/theme/extra-languages/"
        if [ -d "$LANG_DIR" ]; then
          echo "Deleting non-Chinese language folders (keeping fonts/ and languages/)..."
          cd "$LANG_DIR"
          for lang in $(ls -d */ 2>/dev/null | grep -v -E '^(fonts|languages|zh_CN)/'); do
            echo "Removing $lang"
            rm -rf "$lang"
          done
          cd - >/dev/null
          echo "✅ Language folders pruned"
        else
          echo "⚠️ extra-languages directory not found"
        fi

    - name: Set Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 12

    - name: Switch to Python 2
      run: |
        sudo apt-get install -y python2
        wget https://bootstrap.pypa.io/pip/2.7/get-pip.py
        python2 get-pip.py
        sudo rm -rf /usr/bin/python
        sudo ln -s /usr/bin/python2 /usr/bin/python
      continue-on-error: false

    - name: Building recovery
      run: |
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        lunch ${{ github.event.inputs.MAKEFILE_NAME }}-eng && make clean && make ${{ github.event.inputs.BUILD_TARGET }}image -j$(nproc --all)
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: | 
          workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/${{ github.event.inputs.BUILD_TARGET }}.img
          workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/*.zip
          workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/*vendor*.img
        name: ${{ github.event.inputs.DEVICE_NAME }}-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: |
          Manifest: ${{ github.event.inputs.MANIFEST_BRANCH }}
          Device: ${{ github.event.inputs.DEVICE_NAME }}
          Target: ${{ github.event.inputs.BUILD_TARGET }}.img
          Build by Xxinn034 with TWRP customizations
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}